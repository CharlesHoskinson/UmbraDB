 — is generated here for registered cNIGHT holders, and pallet-system-parameters holds the governance-controlled network parameters (the Midnight-side home of the D-parameter).`,inputs:[`observed mainchain events`,`verified transactions from RPC`],outputs:[`state transitions to consensus`,`events & state to RPC`],row:1},{id:`rpc`,zone:`midnight`,title:`RPC Server`,subtitle:`WebSocket · port 9944`,description:`The node's client gateway. DApps and wallets submit transactions; indexers and explorers subscribe to chain state — all over WebSocket RPC on port 9944.`,inputs:[`submitted txs (proof + public outputs)`,`finalized chain state`],outputs:[`tx pool → runtime`,`block & event streams to clients`],row:2},{id:`consensus`,zone:`midnight`,title:`Consensus`,subtitle:`AURA author · GRANDPA finality`,description:`AURA authors a block every six seconds and GRANDPA finalizes it. Today's validators are permissioned Federated Node Operators (FNOs); registered Cardano stake-pool operators (SPOs) join over time, with the mix set by the D-parameter. Partner-chain messages carry their own aggregated signatures (BEEFY).`,inputs:[`candidate state transitions`],outputs:[`sealed & finalized blocks`],row:3},{id:`indexer`,zone:`client`,title:`Indexer`,subtitle:`chain data for clients`,description:`Tails the node RPC, ingests blocks and contract state, and serves wallets and DApps efficient queries and subscriptions — so every client does not have to replay the chain itself.`,inputs:[`WS block/event stream from RPC :9944`],outputs:[`relevant txs & contract state per wallet/DApp`],row:0},{id:`wallet`,zone:`client`,title:`Wallet SDK / DApp`,subtitle:`Compact contracts · local private state`,description:`Where users live. DApps built on Compact contracts (Midnight's TypeScript-based contract language) keep private state locally, compute on it off-chain, and orchestrate proving and submission. The wallet SDK tracks shielded, unshielded and dust state — and persists all of it through UmbraDB.`,inputs:[`indexer streams`,`zk-SNARK proofs`,`restored checkpoints`],outputs:[`witnesses to prover`,`signed txs to RPC`,`state to UmbraDB`],row:1},{id:`proof-server`,zone:`client`,title:`Proof Server`,subtitle:`local zk-SNARK proving`,description:`Generates zero-knowledge proofs from circuit witnesses — locally, so private inputs never leave the user's machine. Returns a compact proof (~128 bytes) that validators can check in milliseconds.`,inputs:[`circuit witness (private inputs)`],outputs:[`zk-SNARK proof`],row:2},{id:`envelope-store`,zone:`umbradb`,title:`WalletStateEnvelopeStore`,subtitle:`wallet snapshots · composed over CheckpointStore`,description:`PgWalletStateEnvelopeStore persists shielded / unshielded / dust wallet-sync snapshots as a single CheckpointStore.save() call. It adds no table or migration of its own — pure composition over the existing chunk/manifest storage.`,inputs:[`wallet state envelopes (shielded · unshielded · dust)`],outputs:[`CheckpointStore.save() calls`],row:0},{id:`checkpoint-store`,zone:`umbradb`,title:`CheckpointStore`,subtitle:`content-addressed snapshots`,description:`Chunked, content-addressed, deduplicated storage for large periodic snapshots (e.g. wallet sync state), with integrity verification and reachability-based garbage collection. Unchanged chunks cost nothing on re-save.`,inputs:[`envelopes / large snapshots`],outputs:[`verified manifests + chunks; restore streams`],row:1},{id:`temporal-kv`,zone:`umbradb`,title:`TemporalKV`,subtitle:`versioned KV · point-in-time reads`,description:`A versioned key-value store with getAt() point-in-time reads, for state that needs history. Backed by plain Postgres tables (JSONB + bytea) with retention laws formalized in Lean.`,inputs:[`put / get / getAt / listKeys`],outputs:[`versioned entries with history`],row:2},{id:`watermarks`,zone:`umbradb`,title:`Watermarks`,subtitle:`sync-progress cursors`,description:`Simple, unversioned cursors that record how far a sync has progressed. Curso  follows the Cardano chain tip and decodes every block as it arrives.`},{edgeId:`e:db-sync->postgres-cexplorer`,text:`Decoded ledger state lands in the cexplorer PostgreSQL schema — a queryable mirror of the mainchain.`},{edgeId:`e:postgres-cexplorer->observation`,text:`pallet-cnight-observation queries Postgres for the current cNIGHT UTxO set. This persistent DB connection is required node infrastructure.`},{edgeId:`e:observation->runtime`,text:`The runtime credits DUST — the shielded resource that pays Midnight fees — to the DUST addresses registered by observed cNIGHT holders.`},{edgeId:`e:runtime->consensus`,text:`The updated dust state is sealed into a block by AURA and finalized by GRANDPA.`},{edgeId:`e:consensus->rpc`,text:`Finalized chain state becomes visible through the node's WebSocket RPC on port 9944.`},{edgeId:`e:rpc->indexer`,text:`The indexer ingests the new block and its DUST updates from the RPC stream.`},{edgeId:`e:indexer->wallet`,text:`The wallet learns its fresh DUST balance from the indexer — no chain replay needed.`},{edgeId:`e:wallet->envelope-store`,text:`The wallet persists a DUST-bearing state envelope locally through UmbraDB's envelope store.`},{edgeId:`e:envelope-store->checkpoint-store`,text:`The envelope is chunked, content-addressed and deduplicated — a single CheckpointStore.save() call.`}]},{id:`shielded-tx`,title:`Shielded transaction`,blurb:`Private computation, public verification: a zk transaction end to end.`,steps:[{edgeId:`e:wallet->proof-server`,text:`The DApp computes on private state locally, then hands the circuit witness to the proof server. Private inputs never leave the machine.`},{edgeId:`e:proof-server->wallet`,text:`The proof server returns a compact zk-SNARK — roughly 128 bytes regardless of how heavy the computation was.`},{edgeId:`e:wallet->rpc`,text:`The wallet submits the proof plus intended public outputs — not the inputs — to the node over RPC.`},{edgeId:`e:rpc->runtime`,text:`The runtime verifies the zk-SNA
